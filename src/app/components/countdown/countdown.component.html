<section class="countdown-section">
  <h2>⏳ Faltan <span class="dias">{{ dias }}</span> días para la catástrofe...</h2>
  <p class="subtitulo">...digo, para la fiesta 🎉</p>
  <div class="contador">
    <div class="bloque"><span>{{ dias }}</span><label>Días</label></div>
    <div class="bloque"><span>{{ horas }}</span><label>Horas</label></div>
    <div class="bloque"><span>{{ minutos }}</span><label>Minutos</label></div>
    <div class="bloque"><span>{{ segundos }}</span><label>Segundos</label></div>
  </div>
</section>
